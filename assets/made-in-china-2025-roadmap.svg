<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="850" viewBox="0 0 1400 850" role="img" aria-label="Experimental agentic CMMS figure">
  <defs>
    <style>
      text { font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif; }
      .title { font-size: 32px; font-weight: 800; fill: #0f172a; }
      .subtitle { font-size: 15px; fill: #475569; }
      .h2 { font-size: 18px; font-weight: 800; fill: #0f172a; }
      .h3 { font-size: 14px; font-weight: 800; fill: #1d4ed8; }
      .small { font-size: 12px; fill: #334155; }
      .tiny { font-size: 10.5px; fill: #475569; }
      .badge { font-size: 13px; font-weight: 800; fill: #ffffff; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .soft { fill: #f8fafc; stroke: #dbeafe; }
      .axis { stroke: #1d4ed8; stroke-width: 2.2; fill: none; }
      .grid { stroke: #cbd5e1; stroke-width: 1; stroke-dasharray: 5 7; }
      .line { stroke: #94a3b8; stroke-width: 1.2; fill: none; }
      .arrow { stroke: #2563eb; stroke-width: 2.2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="blueFill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>

<text class="title" x="42" y="58">Made in China 2025 as a Launchpad for Agentic EAM</text>
<text class="subtitle" x="44" y="88">From manufacturing upgrading to connected, policy-aware, multi-agent asset operations.</text>
<line x1="250" y1="120" x2="1190" y2="120" stroke="#2563eb" stroke-width="3" marker-end="url(#arrowhead)"/>
<circle cx="367.5" cy="120" r="14" fill="#2563eb"/><text class="h2" x="367.5" y="98" text-anchor="middle">2015</text>
<line class="grid" x1="367.5" y1="135" x2="367.5" y2="685"/>
<circle cx="602.5" cy="120" r="14" fill="#2563eb"/><text class="h2" x="602.5" y="98" text-anchor="middle">2020</text>
<line class="grid" x1="602.5" y1="135" x2="602.5" y2="685"/>
<circle cx="837.5" cy="120" r="14" fill="#2563eb"/><text class="h2" x="837.5" y="98" text-anchor="middle">2025</text>
<line class="grid" x1="837.5" y1="135" x2="837.5" y2="685"/>
<circle cx="1072.5" cy="120" r="14" fill="#2563eb"/><text class="h2" x="1072.5" y="98" text-anchor="middle">2030+</text>
<line class="grid" x1="1072.5" y1="135" x2="1072.5" y2="685"/>
<rect x="42" y="150" width="175" height="161" rx="20" fill="#eff6ff" stroke="#bfdbfe"/>
<circle cx="72" cy="184" r="16" fill="#2563eb"/><text class="badge" x="72" y="189" text-anchor="middle">1</text>
<text class="h2" text-anchor="start" x="98" y="193"><tspan x="98" dy="0">Policy and</tspan><tspan x="98" dy="19">industrial</tspan><tspan x="98" dy="19">strategy</tspan></text>
<rect x="250" y="150" width="215" height="161" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
<text class="small" text-anchor="start" x="268" y="192"><tspan x="268" dy="0">State Council launches</tspan><tspan x="268" dy="16">Made in China 2025 and</tspan><tspan x="268" dy="16">frames manufacturing</tspan><tspan x="268" dy="16">upgrading as a national</tspan><tspan x="268" dy="16">strategy.</tspan></text>
<rect x="485" y="150" width="215" height="161" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
<text class="small" text-anchor="start" x="503" y="192"><tspan x="503" dy="0">Industrial internet and</tspan><tspan x="503" dy="16">intelligent manufacturing</tspan><tspan x="503" dy="16">programs scale through</tspan><tspan x="503" dy="16">pilots and standards.</tspan></text>
<rect x="720" y="150" width="215" height="161" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
<text class="small" text-anchor="start" x="738" y="192"><tspan x="738" dy="0">Manufacturing</tspan><tspan x="738" dy="16">modernization becomes more</tspan><tspan x="738" dy="16">sector-wide; AI and data</tspan><tspan x="738" dy="16">begin to enter operations</tspan><tspan x="738" dy="16">deeply.</tspan></text>
<rect x="955" y="150" width="215" height="161" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
<text class="small" text-anchor="start" x="973" y="192"><tspan x="973" dy="0">Agentic EAM becomes a</tspan><tspan x="973" dy="16">platform pattern for</tspan><tspan x="973" dy="16">bounded autonomous asset</tspan><tspan x="973" dy="16">operations.</tspan></text>
<rect x="42" y="335" width="175" height="161" rx="20" fill="#eff6ff" stroke="#bfdbfe"/>
<circle cx="72" cy="369" r="16" fill="#2563eb"/><text class="badge" x="72" y="374" text-anchor="middle">2</text>
<text class="h2" text-anchor="start" x="98" y="378"><tspan x="98" dy="0">Enterprise digital</tspan><tspan x="98" dy="19">capability</tspan></text>
<rect x="250" y="335" width="215" height="161" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
<text class="small" text-anchor="start" x="268" y="377"><tspan x="268" dy="0">Basic asset data</tspan><tspan x="268" dy="16">management; ERP/CMMS</tspan><tspan x="268" dy="16">silos; early standards and</tspan><tspan x="268" dy="16">governance.</tspan></text>
<rect x="485" y="335" width="215" height="161" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
<text class="small" text-anchor="start" x="503" y="377"><tspan x="503" dy="0">IIoT connectivity; cloud</tspan><tspan x="503" dy="16">and edge data platforms;</tspan><tspan x="503" dy="16">smart-factory pilots.</tspan></text>
<rect x="720" y="335" width="215" height="161" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
<text class="small" text-anchor="start" x="738" y="377"><tspan x="738" dy="0">Unified data models; real-</tspan><tspan x="738" dy="16">time monitoring;</tspan><tspan x="738" dy="16">predictive analytics and</tspan><tspan x="738" dy="16">compliance integration.</tspan></text>
<rect x="955" y="335" width="215" height="161" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
<text class="small" text-anchor="start" x="973" y="377"><tspan x="973" dy="0">Digital twins; cross-</tspan><tspan x="973" dy="16">functional agents;</tspan><tspan x="973" dy="16">continuous learning from</tspan><tspan x="973" dy="16">maintenance outcomes.</tspan></text>
<rect x="42" y="520" width="175" height="161" rx="20" fill="#eff6ff" stroke="#bfdbfe"/>
<circle cx="72" cy="554" r="16" fill="#2563eb"/><text class="badge" x="72" y="559" text-anchor="middle">3</text>
<text class="h2" text-anchor="start" x="98" y="563"><tspan x="98" dy="0">CMMS/EAM evolution</tspan></text>
<rect x="250" y="520" width="215" height="161" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
<text class="small" text-anchor="start" x="268" y="562"><tspan x="268" dy="0">Traditional CMMS: work</tspan><tspan x="268" dy="16">orders</tspan></text>
<rect x="485" y="520" width="215" height="161" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
<text class="small" text-anchor="start" x="503" y="562"><tspan x="503" dy="0"> PMs</tspan></text>
<rect x="720" y="520" width="215" height="161" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
<text class="small" text-anchor="start" x="738" y="562"><tspan x="738" dy="0"> inventory</tspan></text>
<rect x="955" y="520" width="215" height="161" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
<text class="small" text-anchor="start" x="973" y="562"><tspan x="973" dy="0"> basic reporting.</tspan></text>
<rect x="1212" y="150" width="145" height="520" rx="20" fill="#ffffff" stroke="#bfdbfe"/>
<text class="h2" x="1232" y="185">Priority sectors</text>
<rect x="1230" y="200" width="110" height="28" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
<text class="tiny" text-anchor="start" x="1241" y="219"><tspan x="1241" dy="0">Next-gen IT</tspan></text>
<rect x="1230" y="242" width="110" height="28" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
<text class="tiny" text-anchor="start" x="1241" y="261"><tspan x="1241" dy="0">CNC &amp; robotics</tspan></text>
<rect x="1230" y="284" width="110" height="28" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
<text class="tiny" text-anchor="start" x="1241" y="303"><tspan x="1241" dy="0">Aerospace</tspan></text>
<rect x="1230" y="326" width="110" height="28" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
<text class="tiny" text-anchor="start" x="1241" y="345"><tspan x="1241" dy="0">Ocean engineering</tspan></text>
<rect x="1230" y="368" width="110" height="28" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
<text class="tiny" text-anchor="start" x="1241" y="387"><tspan x="1241" dy="0">Advanced rail</tspan></text>
<rect x="1230" y="410" width="110" height="28" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
<text class="tiny" text-anchor="start" x="1241" y="429"><tspan x="1241" dy="0">Energy-saving &amp;</tspan><tspan x="1241" dy="12">NEV</tspan></text>
<rect x="1230" y="452" width="110" height="28" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
<text class="tiny" text-anchor="start" x="1241" y="471"><tspan x="1241" dy="0">Power equipment</tspan></text>
<rect x="1230" y="494" width="110" height="28" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
<text class="tiny" text-anchor="start" x="1241" y="513"><tspan x="1241" dy="0">Agricultural</tspan><tspan x="1241" dy="12">machinery</tspan></text>
<rect x="1230" y="536" width="110" height="28" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
<text class="tiny" text-anchor="start" x="1241" y="555"><tspan x="1241" dy="0">New materials</tspan></text>
<rect x="1230" y="578" width="110" height="28" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
<text class="tiny" text-anchor="start" x="1241" y="597"><tspan x="1241" dy="0">Biopharma &amp;</tspan><tspan x="1241" dy="12">devices</tspan></text>
<rect x="42" y="725" width="1315" height="70" rx="18" fill="#f8fafc" stroke="#dbeafe"/>
<text class="h3" x="70" y="755">CMMS/EAM meaning:</text>
<text class="small" x="210" y="755">More connected assets 鈫?more complex compliance 鈫?higher uptime expectations 鈫?greater value from cross-agent collaboration and explainable automation.</text>
