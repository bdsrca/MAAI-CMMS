<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720" role="img" aria-label="Experimental agentic CMMS figure">
  <defs>
    <style>
      text { font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif; }
      .title { font-size: 32px; font-weight: 800; fill: #0f172a; }
      .subtitle { font-size: 15px; fill: #475569; }
      .h2 { font-size: 18px; font-weight: 800; fill: #0f172a; }
      .h3 { font-size: 14px; font-weight: 800; fill: #1d4ed8; }
      .small { font-size: 12px; fill: #334155; }
      .tiny { font-size: 10.5px; fill: #475569; }
      .badge { font-size: 13px; font-weight: 800; fill: #ffffff; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .soft { fill: #f8fafc; stroke: #dbeafe; }
      .axis { stroke: #1d4ed8; stroke-width: 2.2; fill: none; }
      .grid { stroke: #cbd5e1; stroke-width: 1; stroke-dasharray: 5 7; }
      .line { stroke: #94a3b8; stroke-width: 1.2; fill: none; }
      .arrow { stroke: #2563eb; stroke-width: 2.2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="blueFill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>

<text class="title" x="42" y="58">Automation Permission Matrix for Agentic CMMS/EAM</text>
<text class="subtitle" x="44" y="88">A practical guardrail: increase autonomy only when risk is low, reversibility is high, and policy evidence is complete.</text>
<rect x="100.0" y="145.0" width="315.0" height="205.0" rx="18" fill="#ecfdf5" stroke="#cbd5e1"/>
<text class="h2" text-anchor="start" x="122.0" y="190.0"><tspan x="122.0" dy="0">Auto-draft and optionally auto-</tspan><tspan x="122.0" dy="18">create</tspan></text>
<text class="small" text-anchor="start" x="122.0" y="248.0"><tspan x="122.0" dy="0">Low-risk, reversible, tenant-enabled</tspan><tspan x="122.0" dy="16">tasks such as duplicate detection or</tspan><tspan x="122.0" dy="16">low-priority work request drafts.</tspan></text>
<rect x="425.0" y="145.0" width="315.0" height="205.0" rx="18" fill="#fffbeb" stroke="#cbd5e1"/>
<text class="h2" text-anchor="start" x="447.0" y="190.0"><tspan x="447.0" dy="0">Draft only; human validates</tspan><tspan x="447.0" dy="18">before write</tspan></text>
<text class="small" text-anchor="start" x="447.0" y="248.0"><tspan x="447.0" dy="0">Moderate complexity or weak evidence.</tspan><tspan x="447.0" dy="16">Agents may recommend, but the planner</tspan><tspan x="447.0" dy="16">approves the work order or part</tspan><tspan x="447.0" dy="16">reservation.</tspan></text>
<rect x="100.0" y="360.0" width="315.0" height="205.0" rx="18" fill="#fef2f2" stroke="#cbd5e1"/>
<text class="h2" text-anchor="start" x="122.0" y="405.0"><tspan x="122.0" dy="0">Human approval required</tspan></text>
<text class="small" text-anchor="start" x="122.0" y="463.0"><tspan x="122.0" dy="0">Safety, compliance, or production-</tspan><tspan x="122.0" dy="16">impacting actions. The agent package</tspan><tspan x="122.0" dy="16">must show evidence, assumptions, and</tspan><tspan x="122.0" dy="16">alternatives.</tspan></text>
<rect x="425.0" y="360.0" width="315.0" height="205.0" rx="18" fill="#fff7ed" stroke="#cbd5e1"/>
<text class="h2" text-anchor="start" x="447.0" y="405.0"><tspan x="447.0" dy="0">Blocked unless formal workflow</tspan><tspan x="447.0" dy="18">approves</tspan></text>
<text class="small" text-anchor="start" x="447.0" y="463.0"><tspan x="447.0" dy="0">Shutdowns, OT commands, critical</tspan><tspan x="447.0" dy="16">rail/grid actions, budget-heavy</tspan><tspan x="447.0" dy="16">commitments, or policy exceptions.</tspan></text>
<line class="axis" x1="100" y1="610" x2="770" y2="610" marker-end="url(#arrowhead)"/>
<line class="axis" x1="65" y1="575" x2="65" y2="125" marker-end="url(#arrowhead)"/>
<text class="h2" x="330" y="638">Action side-effect / irreversibility</text>
<text class="h2" x="38" y="420" transform="rotate(-90 38 420)">Operational and safety risk</text>
<rect x="800" y="145" width="250" height="430" rx="22" fill="#ffffff" stroke="#bfdbfe"/>
<text class="h2" x="825" y="184">Approval signals</text>
<circle cx="828" cy="223" r="12" fill="#2563eb"/><text class="badge" x="828" y="228" text-anchor="middle">鉁?/text>
<text class="small" text-anchor="start" x="850" y="228"><tspan x="850" dy="0">Tenant feature flag</tspan><tspan x="850" dy="14">enabled</tspan></text>
<circle cx="828" cy="268" r="12" fill="#2563eb"/><text class="badge" x="828" y="273" text-anchor="middle">鉁?/text>
<text class="small" text-anchor="start" x="850" y="273"><tspan x="850" dy="0">Role has scope for tool</tspan></text>
<circle cx="828" cy="313" r="12" fill="#2563eb"/><text class="badge" x="828" y="318" text-anchor="middle">鉁?/text>
<text class="small" text-anchor="start" x="850" y="318"><tspan x="850" dy="0">Evidence is fresh and</tspan><tspan x="850" dy="14">cited</tspan></text>
<circle cx="828" cy="358" r="12" fill="#2563eb"/><text class="badge" x="828" y="363" text-anchor="middle">鉁?/text>
<text class="small" text-anchor="start" x="850" y="363"><tspan x="850" dy="0">Policy checks pass</tspan></text>
<circle cx="828" cy="403" r="12" fill="#2563eb"/><text class="badge" x="828" y="408" text-anchor="middle">鉁?/text>
<text class="small" text-anchor="start" x="850" y="408"><tspan x="850" dy="0">Budget and threshold pass</tspan></text>
<circle cx="828" cy="448" r="12" fill="#2563eb"/><text class="badge" x="828" y="453" text-anchor="middle">鉁?/text>
<text class="small" text-anchor="start" x="850" y="453"><tspan x="850" dy="0">Audit event is written</tspan></text>
<circle cx="828" cy="493" r="12" fill="#2563eb"/><text class="badge" x="828" y="498" text-anchor="middle">鉁?/text>
<text class="small" text-anchor="start" x="850" y="498"><tspan x="850" dy="0">Human can reverse or</tspan><tspan x="850" dy="14">override</tspan></text>
</svg>
